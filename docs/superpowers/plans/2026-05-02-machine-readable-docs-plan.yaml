---
meta:
  title: "Machine-Readable Documentation Migration"
  spec: "docs/superpowers/specs/2026-05-02-machine-readable-docs-design.yaml"
  status: in_progress
  created: "2026-05-02"

summary: >
  Convert all 49 docs/*.md into a single machine-readable
  docs/knowledge.yaml, add YAML output variants for auto-generated
  docs, migrate speckit templates and existing specs/plans to YAML,
  then remove the original .md files.

tasks:
  - id: T-1
    priority: P0
    title: "Create docs/knowledge.yaml"
    description: >
      Manually convert all 49 hand-written Markdown documents in docs/
      into a single unified YAML file. Each document becomes a knowledge
      entry with id, title, category, status, tags, entities (cross-refs
      to module-index.yaml), content (structured per category), and
      references. This is the largest single task.
    files:
      - docs/knowledge.yaml
    acceptance:
      - "All 49 documents represented as knowledge entries"
      - "Every entry has valid id, title, category, status, tags"
      - "entities fields reference valid module-index.yaml entries"
      - "references field links to other knowledge entries where applicable"
      - "just lint passes"

  - id: T-2
    priority: P1
    title: "Update index-salt.py for YAML output"
    description: >
      Add generate_state_map_yaml() and generate_data_inventory_yaml()
      functions to scripts/index-salt.py. These generate structured YAML
      alongside the existing .md output. state-map.yaml contains the
      dependency graph as machine-readable edges. data-inventory.yaml
      contains the data file consumer mapping.
    files:
      - scripts/index-salt.py
      - docs/state-map.yaml
      - docs/data-inventory.yaml
    depends_on: []  # independent from knowledge.yaml
    acceptance:
      - "state-map.yaml generated with valid YAML"
      - "data-inventory.yaml generated with valid YAML"
      - "Existing .md output unchanged"
      - "just index runs without error"

  - id: T-3
    priority: P2
    title: "Convert speckit templates to YAML"
    description: >
      Create YAML versions of spec-template.md, plan-template.md,
      and tasks-template.md under .specify/templates/. Update
      create-new-feature.sh and setup-plan.sh to detect and use YAML
      templates. The YAML schemas follow the design in the spec doc.
    files:
      - .specify/templates/spec-template.yaml
      - .specify/templates/plan-template.yaml
      - .specify/templates/tasks-template.yaml
      - .specify/scripts/bash/create-new-feature.sh
      - .specify/scripts/bash/setup-plan.sh
    depends_on: []  # independent from knowledge.yaml
    acceptance:
      - "YAML templates produce valid specs/plans/tasks"
      - "Existing .md templates still work (backward compat)"
      - "just lint passes"

  - id: T-4
    priority: P2
    title: "Migrate existing specs and plans to YAML"
    description: >
      Convert 9 spec files and 2 plan files in docs/superpowers/ from
      Markdown to YAML format following the established schemas. Keep
      original .md files during transition, remove after verification.
    files:
      - docs/superpowers/specs/*.yaml
      - docs/superpowers/plans/*.yaml
    depends_on: [T-3]
    acceptance:
      - "All 9 specs converted to YAML"
      - "All 2 plans converted to YAML"
      - "Content verified against original .md files"
      - "just lint passes"

  - id: T-5
    priority: P1
    title: "Remove original .md docs and update AGENTS.md"
    description: >
      After docs/knowledge.yaml is verified to cover all 49 documents,
      delete the original .md files from docs/. Update AGENTS.md to
      reference knowledge.yaml alongside module-index.yaml. Update
      lint-docs.py to check knowledge.yaml instead of .md files.
    files:
      - AGENTS.md
      - scripts/lint-docs.py
    depends_on: [T-1]
    acceptance:
      - "No .md files remain in docs/ except auto-generated state-map.md and data-inventory.md"
      - "AGENTS.md references knowledge.yaml"
      - "lint-docs.py validates knowledge.yaml"
      - "just lint passes"
