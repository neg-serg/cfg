# Gaming environment variables (globally safe — read only by target software)

# Vulkan driver: prefer RADV over AMDVLK (both installed — amdvlk-bin + vulkan-radeon)
AMD_VULKAN_ICD=RADV

# DXVK: async shader compilation + state cache (Proton games only)
DXVK_ASYNC=1
DXVK_STATE_CACHE=1

# Wine/Proton: AMD FidelityFX Super Resolution upscaling
WINE_FULLSCREEN_FSR=1
WINE_FULLSCREEN_FSR_STRENGTH=2

# Mesa: threaded OpenGL dispatch + shader cache limit
mesa_glthread=true
MESA_SHADER_CACHE_MAX_SIZE=10G

# MangoHud: disabled by default, toggled in-game via keybind
MANGOHUD=0

# Steam: prefer host PulseAudio/ALSA over Steam runtime's bundled Ubuntu 1.1 libs
# Fixes PipeWire audio in Proton/Steam Linux Runtime games (no-sound bug)
STEAM_RUNTIME_PREFER_HOST_LIBRARIES=1
