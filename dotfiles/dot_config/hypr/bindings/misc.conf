bind = $M1, g, exec, ~/.local/bin/hypr-win-list
bind = $M1, backslash, exec, ~/.local/bin/hypr-win-list
bind = $M4+$S, m, exec, ~/.local/bin/main-menu
bind = $M4, slash, exec, ~/.local/bin/hypr-shortcuts
bind = $M4+$S, r, exec, shot="$HOME/pic/shots/satty-$(date '+%Y%m%d-%H.%M.%S').png"; grim "$shot" && pic-info "$shot"
bind = $M4+$S+$C, r, exec, shot="$HOME/pic/shots/satty-$(date '+%Y%m%d-%H.%M.%S').png"; grim -g "$(slurp)" "$shot" && pic-info "$shot"
# Screen recording (wf-recorder)
bind = $M4+$S, v, exec, ~/.local/bin/screenrec screen
bind = $M4+$S+$C, v, exec, ~/.local/bin/screenrec area
bind = $M1, q, exec, $menu
bind = , Caps_Lock, exec, swayosd-client --caps-lock

# System Recovery / Fix
# Restarts Pyprland and reloads Hyprland config
bind = $M4, apostrophe, exec, ~/.local/bin/hypr-fix
# Drops kernel caches + reduces IO/swap pressure when system lags
bind = $M4+$S, apostrophe, exec, ~/.local/bin/sys-relief
bind = $M4, i, exec, wlr-which-key
# DarkWindow: toggle invert shader on active window
# FIXME: darkwindow:shadeactive broken with Hyprland 0.55.1 (addDispatcherV2 API mismatch)
# bind = $M4+$C, i, darkwindow:shadeactive, invert

# Proxy switching for Zen Browser
bind = $M4+$M1, p, exec, ~/.local/bin/switch-proxy
