# HyprGlass — liquid glass effect for transparent windows
# Tuned for dark minimal aesthetic (no rounding, subtle effects)

plugin:hyprglass {
    enabled = 1
    default_theme = dark
    default_preset = noglass

    # Blur: complement existing decoration blur, not overpower it
    blur_strength = 1.0    # Was 1.8 — reduced to kill glow. If re-enabling, try ≤1.0
    blur_iterations = 3

    # Glass visual effects disabled — causes unwanted washout/overexposure (засвечивание)
    # refraction_strength = 0.3
    # chromatic_aberration = 0.2
    # lens_distortion = 0.15

    # Edge and lighting: disabled to remove haze/glow artifacts
    # fresnel_strength = 0.05
    # specular_strength = 0.05
    # edge_thickness = 0.03
    glass_opacity = 0.85

    # Tint: dark blue to match $col_border_active_base
    tint_color = 0x00285918

    # Tone mapping disabled — was causing washout on qs-panel layer
    # dark:brightness = 0.85
    # dark:saturation = 0.9
    # dark:adaptive_dim = 0.15

    # Layer surfaces (bar, dock, etc.) — HyprGlass instead of decoration blur
    layers {
        enabled = 1
        namespaces = qs-panel
        preset = default
    }

    # No-glass preset for windows excluded from HyprGlass effects
    preset = name:noglass, glass_opacity:0
}
