[tool.pytest.ini_options]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests (require special setup)",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["dotfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# salt_compat must be imported and patched before any salt imports
"scripts/salt-daemon.py" = ["E402"]
"scripts/salt_runner.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
