decisions:
  - id: R-001
    decision: "Use python-telegram-bot (PTB) library for Bot API interaction"
    rationale: "PTB is the most mature Python Bot API library in Arch repos (python-telegram-bot). Existing project already uses telethon for MTProto; PTB covers Bot API (HTTP) which Managed Bots requires. Managed Bots is a Bot API feature, not MTProto."
    alternatives:
      - "python-telegram-bot-raw (lower-level, more manual)"
      - "aiohttp + manual API calls (too low-level, reinvents polling)"

  - id: R-002
    decision: "Use `gopass insert` subprocess for token storage"
    rationale: "Constitution mandates secrets in gopass. Child bot tokens are written via `echo $TOKEN | gopass insert telegram/managed-bots/<username>`. The Salt state for child bots resolves tokens via `gopass show -o`."
    alternatives:
      - "python-gnupg direct (too low-level, breaks gopass abstraction)"
      - "Config file with gopass template reference (indirection, Salt can't resolve easily)"

  - id: R-003
    decision: "Store managed bot metadata in YAML registry file (~/.config/opencode/managed-bots.yaml)"
    rationale: "Non-secret metadata (username, user_id, creator_uid, created_at, last_rotated) is not a secret. YAML is consistent with repo data files. Token is in gopass, not in this file."
    alternatives:
      - "SQLite (overkill for ~10 bots)"
      - "Inline in gopass notes (mixing metadata with secrets)"

  - id: R-004
    decision: "Bot runs as long-polling daemon (not webhook)"
    rationale: "Project convention: existing bots (telethon-bridge, opencode-telegram-bot) use long-polling behind SOCKS5 proxy. Webhook would require public endpoint and reverse proxy config."
    alternatives:
      - "Webhook (requires nginx/caddy, public endpoint, TLS)"

  - id: R-005
    decision: "Single manager bot per token; no multi-manager orchestration"
    rationale: "Telegram allows one bot with `can_manage_bots: true` per token. Multiple manager bots would require separate BotFather registrations, adding complexity for no gain at ~10 bot scale."
    alternatives:
      - "Multiple manager bots per token (not supported by Telegram API)"

  - id: R-006
    decision: "SOCKS5 proxy for all Telegram API calls"
    rationale: "Required by constitution and existing infrastructure. All Telegram API traffic routes through proxy."
    alternatives:
      - "Direct connection (blocked by network policy)"

unknowns_resolved:
  - topic: "request_managed_bot in python-telegram-bot"
    finding: "PTB 21.x+ supports `KeyboardButton.request_managed_bot` via `KeyboardButton(text='...', request_managed_bot=KeyboardButtonRequestManagedBot(...))`. The `ManagedBotUpdated` update arrives as `Update.managed_bot` on the Application handler."
    source: "python-telegram-bot docs + Bot API 9.6 changelog"

  - topic: "Managed bot creation rate limit"
    finding: "Bot API docs do not document a specific rate limit for managed bot creation. Conservative approach: enforce 1 bot per user per hour via application-level rate limit to avoid surprises."
    source: "Bot API 9.6 docs, empirical testing needed"

  - topic: "getManagedBotToken response format"
    finding: "GET request returns plain string (the token). No JSON wrapper. PTB's Bot.get_managed_bot_token(user_id) handles this."
    source: "Bot API 9.6 docs"
