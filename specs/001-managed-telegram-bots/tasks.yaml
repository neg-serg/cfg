metadata:
  feature_name: "Managed Telegram Bots (Bot API 9.6)"
  input_refs:
    - "specs/001-managed-telegram-bots/spec.md"
    - "specs/001-managed-telegram-bots/plan.md"
    - "specs/001-managed-telegram-bots/research.yaml"
    - "specs/001-managed-telegram-bots/data-model.yaml"
    - "specs/001-managed-telegram-bots/contracts/bot-commands.yaml"
  prerequisites: "plan.yaml (done), spec.yaml (done)"

conventions:
  task_format: "[P?] [Story] Description with exact file paths"
  parallel_marker: "[P] = different files, no dependencies"
  story_marker: "[US1], [US2] = which user story"

phases:
  - name: Setup
    order: 1
    description: "Project initialization and Salt data scaffolding"
    purpose: "Shared infrastructure that all later phases depend on"
    tasks:
      - id: T001
        description: "Add managed_bots to states/data/hosts.yaml feature gates (telfir: true)"
        parallel: false
      - id: T002
        description: "[P] Add python-telegram-bot to states/data/packages.yaml under existing telegram category"
        parallel: true
      - id: T003
        description: "[P] Create states/data/telegram_managed_bots.yaml with owner UIDs and allowlist stubs"
        parallel: true
    checkpoint: "Salt data files ready, feature gated"

  - name: Foundational
    order: 2
    description: "Core infrastructure blocking all user stories"
    purpose: "CRITICAL: No user story work until this phase completes"
    tasks:
      - id: T004
        description: "Create states/configs/managed-bots.yaml.j2 Jinja2 config template (bot token, proxy, owner UIDs, allowlist UIDs, registry path, gopass prefix)"
        parallel: false
      - id: T005
        description: "[P] Create states/units/user/managed-bots.service systemd user unit (Type=simple, after network, restart on failure, SOCKS5 proxy env, MemoryMax=256M)"
        parallel: true
      - id: T006
        description: "[P] Create skeleton states/scripts/managed-bots-runner.py with ArgumentParser, config loading from managed-bots.yaml, logging setup, and can_manage_bots startup check (FR-011)"
        parallel: true
      - id: T007
        description: "[P] Implement gopass token read/write helper in states/scripts/managed-bots-runner.py (subprocess to gopass show/insert; store token at telegram/managed-bots/<username>)"
        parallel: true
      - id: T008
        description: "[P] Implement YAML registry file read/write in states/scripts/managed-bots-runner.py (~/.config/opencode/managed-bots-registry.yaml) with ManagedBot entity fields per data-model.yaml"
        parallel: true
      - id: T009
        description: "Create states/managed_bots.sls Salt state: package install (python-telegram-bot), config deploy (managed-bots.yaml.j2), script deploy (managed-bots-runner.py), service deploy (managed-bots.service), with idempotency guards"
        parallel: false
      - id: T010
        description: "[P] Include managed_bots in states/system_description.sls under host feature gate (telethon_bridge section)"
        parallel: true
      - id: T011
        description: "[P] Include managed_bots in states/group/ai.sls"
        parallel: true
    checkpoint: "Foundation ready — config deploys, service starts, self-check passes. User story implementation can begin."

  - name: US1+US2 (P1) — Bot Creation & Token Storage
    order: 3
    story_number: "1+2"
    title: "Create managed bot via button + store token"
    priority: P1
    goal: "User taps 'Create Bot' button → Telegram creates bot → manager stores token in gopass"
    independent_test: "Send /start to manager bot, tap 'Create Bot', complete Telegram dialog, verify bot appears in registry and token in gopass"
    implementation_tasks:
      - id: T012
        description: "[P] [US1] Implement /start handler in states/scripts/managed-bots-runner.py: send welcome message with request_managed_bot KeyboardButton (SuggestedName from config)"
        parallel: true
        story: US1
      - id: T013
        description: "[P] [US1] Implement ManagedBotUpdated handler in states/scripts/managed-bots-runner.py: extract bot User object (id, username) and creator User object (id) from Update.managed_bot"
        parallel: true
        story: US1
      - id: T014
        description: "[US1] Implement managed_bot_created message handler in states/scripts/managed-bots-runner.py: log event, skip duplicate token storage"
        parallel: false
        story: US1
      - id: T015
        description: "[US2] Implement getManagedBotToken call in states/scripts/managed-bots-runner.py: call Bot.get_managed_bot_token(user_id), store token via gopass insert, append to registry YAML, reply to creator with confirmation"
        parallel: false
        story: US2
        depends_on: [T013, T007, T008]
      - id: T016
        description: "[US2] Implement startup registry reconciliation in states/scripts/managed-bots-runner.py: on boot, read registry, verify each bot's token in gopass, log missing/broken entries"
        parallel: false
        story: US2
        depends_on: [T008, T015]
    checkpoint: "US1+US2 complete — bot creation flow works end-to-end, token stored in gopass"

  - name: US3 (P2) — Token Rotation
    order: 4
    story_number: 3
    title: "Rotate child bot tokens"
    priority: P2
    goal: "Owner sends /rotate_token <username>, manager calls replaceManagedBotToken, stores new token, old token revoked"
    independent_test: "Create a test bot, send /rotate_token <username>, verify new token in gopass differs from old token, verify old token no longer works"
    implementation_tasks:
      - id: T017
        description: "[P] [US3] Implement owner UID gate decorator/helper in states/scripts/managed-bots-runner.py: check sender UID against owner list from config (FR-007)"
        parallel: true
        story: US3
      - id: T018
        description: "[US3] Implement /rotate_token handler in states/scripts/managed-bots-runner.py: validate username in registry, call Bot.replace_managed_bot_token(bot_user_id), store new token via gopass insert, update registry last_rotated_at, reply with success"
        parallel: false
        story: US3
        depends_on: [T017, T008, T007]
      - id: T019
        description: "[P] [US3] Implement error responses for /rotate_token in states/scripts/managed-bots-runner.py: bot not found, not authorized, API error (per contracts/bot-commands.yaml)"
        parallel: true
        story: US3
        depends_on: [T018]
    checkpoint: "Token rotation works, old tokens revoked, new tokens in gopass"

  - name: US4 (P2) — List Managed Bots
    order: 5
    story_number: 4
    title: "List managed bots"
    priority: P2
    goal: "Owner sends /bots, manager replies with list of all managed bots and their metadata"
    independent_test: "Create 2-3 test bots, send /bots, verify list shows correct usernames, creation dates, creator UIDs, and [DELETED] markers"
    implementation_tasks:
      - id: T020
        description: "[US4] Implement /bots handler in states/scripts/managed-bots-runner.py: read registry YAML, format list with username, bot_user_id, creator_uid, created_at, status (active/deleted), send as formatted Telegram message (FR-005)"
        parallel: false
        story: US4
        depends_on: [T017, T008]
      - id: T021
        description: "[P] [US4] Implement empty registry response for /bots in states/scripts/managed-bots-runner.py: 'No managed bots' when registry is empty"
        parallel: true
        story: US4
        depends_on: [T020]
    checkpoint: "/bots command works for owner, shows all bots with correct metadata"

  - name: US5 (P3) — Self-Service Provisioning
    order: 6
    story_number: 5
    title: "Self-service bot provisioning"
    priority: P3
    goal: "Allowlisted non-owner users can create their own bots via the manager bot"
    independent_test: "Allowlisted user starts chat, taps 'Create Bot', completes flow, verifies bot created with their UID as creator. Non-allowlisted user gets 'Not authorized'."
    implementation_tasks:
      - id: T022
        description: "[US5] Implement allowlist check in /start handler in states/scripts/managed-bots-runner.py: read allowlist UIDs from config, show 'Create Bot' button only to allowlisted users (FR-012)"
        parallel: false
        story: US5
        depends_on: [T012]
      - id: T023
        description: "[P] [US5] Implement per-user bot creation limit in states/scripts/managed-bots-runner.py: check user's existing bot count from registry, reject if at max (default 1 per user from data-model.yaml)"
        parallel: true
        story: US5
        depends_on: [T008, T022]
      - id: T024
        description: "[P] [US5] Implement 'Not authorized' response for non-allowlisted users in /start handler in states/scripts/managed-bots-runner.py (per contracts/bot-commands.yaml)"
        parallel: true
        story: US5
        depends_on: [T022]
    checkpoint: "Self-service works: allowlisted users can create bots, non-allowlisted get rejection"

  - name: Polish
    order: 99
    description: "Cross-cutting improvements and documentation"
    purpose: "Documentation, monitoring, and state registry integration"
    tasks:
      - id: T025
        description: "[P] Add managed-bots service to states/data/monitored_services.yaml (severity: warning, health_cmd: pgrep -f managed-bots-runner, auto_restart: true)"
        parallel: true
      - id: T026
        description: "[P] Add managed-bots secrets to docs/secrets-scheme.md (api/telegram-manager-bot, telegram/managed-bots/*)"
        parallel: true
      - id: T027
        description: "Create docs/managed-bots-ops.md operator guide with setup steps from quickstart.yaml"
        parallel: false

dependencies:
  phase_dependencies:
    - phase: "Setup"
      depends_on: []
    - phase: "Foundational"
      depends_on: ["Setup"]
      blocks: ["all user stories"]
    - phase: "US1+US2 (P1)"
      depends_on: ["Foundational"]
    - phase: "US3 (P2)"
      depends_on: ["US1+US2 (P1)"]
    - phase: "US4 (P2)"
      depends_on: ["Foundational"]
    - phase: "US5 (P3)"
      depends_on: ["US1+US2 (P1)"]
    - phase: "Polish"
      depends_on: ["all desired user stories complete"]
  story_dependencies:
    - story: "US1+US2 (P1)"
      depends_on: ["Foundational"]
      independent: true
    - story: "US3 (P2)"
      depends_on: ["US1+US2"]
      independent: false
    - story: "US4 (P2)"
      depends_on: ["Foundational"]
      independent: true
    - story: "US5 (P3)"
      depends_on: ["US1+US2"]
      independent: false
  within_story_order:
    - "Handler registration before signal wiring"
    - "Token storage before token rotation"
    - "Owner gate before privileged commands"

strategy:
  mvp_first:
    - "Phase 1: Setup (T001-T003)"
    - "Phase 2: Foundational (T004-T011)"
    - "Phase 3: US1+US2 (T012-T016) — core bot creation + token storage"
    - "STOP and VALIDATE: Create a test bot end-to-end"
  incremental_delivery:
    - "Setup + Foundational => Foundation ready"
    - "US1+US2 => Core bot creation flow working (MVP)"
    - "US4 => /bots command (can be done in parallel with US3)"
    - "US3 => Token rotation"
    - "US5 => Self-service provisioning"
    - "Polish => Monitoring, docs, secrets scheme"
