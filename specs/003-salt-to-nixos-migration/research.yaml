# Phase 0 Research: Salt to NixOS Migration — Bare-Metal Deployment
# Generated: 2026-05-24

decisions:

  - topic: "VM-to-bare-metal code sharing"
    decision: |
      Core modules stay in vms/nixos/modules/ (shared).
      Bare-metal flake imports the same modules + adds hardware-specific overrides
      via a hardware-configuration.nix (generated by nixos-generate-config) and a
      separate disk-config-baremetal.nix (disko).
    rationale: |
      - Modules are already written in a reusable style with mkEnableOption feature toggles
      - The VM flake (vms/nixos/flake.nix) already imports all modules
      - A bare-metal flake can live at the repo root (e.g., hosts/neg-nixos/flake.nix)
        or at vms/nixos/baremetal/flake.nix
      - Hardware-specific config stays minimal: GPU drivers, disk layout, bootloader
      - Same module gets tested in VM first, then deployed on real hardware unchanged
    alternatives_considered:
      - "Separate copy of modules in hosts/: rejected — would drift from VM-tested version"
      - "Flake inputs with module path reference: possible but adds complexity"

  - topic: "Bare-metal disk layout (disko)"
    decision: |
      btrfs + LUKS (single LUKS2 partition on nvme0n1 or sda) with subvolumes:
      @ → / (not /root — NixOS convention)
      @home → /home
      @nix → /nix
      @snapshots → /.snapshots
      @log → /var/log
      ESP at /boot (vfat, 1GiB).
      Swap: swapfile on @ (8GB), or ZRAM if RAM is sufficient.
    rationale: |
      - Matches existing Salt btrfs layout (CachyOS install) for familiarity
      - btrfs subvolumes allow snapper/rollback if needed
      - LUKS2 + Argon2 for encryption (compatible with age-based key derivation)
      - Swapfile avoids dedicated swap partition (flexible resizing)
      - /nix on separate subvolume avoids filling root when /nix/store grows
    alternatives_considered:
      - "ext4 + LVM: rejected — NixOS community standard is btrfs for workstation deployments"
      - "ZFS: rejected — licensing friction, btrfs is sufficient"
      - "tmpfs on /: viable but requires a /persist partition; btrfs subvolumes are simpler"

  - topic: "GPU drivers for AMD (bare metal)"
    decision: |
      Use nixpkgs hardware.amdgpu module + mesa + amdvlk + rocm packages.
      Hardware-specific: hardware-configuration.nix (generated) + a gpu-amd.nix module.
    rationale: |
      - Current system uses CachyOS kernel with amdgpu + amdvlk + Vulkan + ROCm
      - NixOS provides: hardware.amdgpu.enable = true (auto-configures firmware, modules)
      - mesa for OpenGL/Vulkan, amdvlk for AMD Vulkan, rocmPackages for compute
      - For VM testing: virtio-gpu/virgl is the available GPU; amdgpu module is conditional
      - Feature toggle: _gpu.mode = "amd" | "virtio" | "none"
    alternatives_considered:
      - "proprietary AMDGPU-PRO: rejected — mesa + amdvlk + rocm are the standard OSS stack"
      - "NVIDIA: not applicable — user has RX 6000/7000 series AMD GPU"

  - topic: "One-command deployment tool"
    decision: |
      Use nixos-anywhere for the initial install onto bare metal from the CachyOS host.
      For subsequent updates: nixos-rebuild switch (standard NixOS workflow).
      Wrapper script deploy.sh that:
      1. Validates prerequisites (age key, disk availability, etc.)
      2. Builds the system closure
      3. Optionally runs nixos-anywhere for fresh install
      4. Or runs nixos-rebuild switch for updates on already-running system
    rationale: |
      - nixos-anywhere handles the hardest part: creating partitions on a target
        machine and installing NixOS over SSH (or locally from a live USB)
      - Works with disko partition definitions (already exists)
      - Supports LUKS passphrase injection
      - For daily updates: standard nixos-rebuild is one command already
    alternatives_considered:
      - "nixos-generators + dd to disk: works but replaces entire disk, not incremental"
      - "Manual live USB + disko script: viable fallback but not one-command"
      - "kickstart: overkill for single machine"

  - topic: "Dual-boot migration path"
    decision: |
      Use a separate physical disk (NVMe or SATA) for the NixOS install.
      Keep the existing CachyOS disk as a bootable fallback.
      Switch boot target via UEFI boot menu (F12/boot-select) during transition.
    rationale: |
      - Safest approach: if NixOS fails to boot, user can still boot CachyOS
      - Separate disk avoids partition table conflicts
      - Once NixOS is stable and tested for a week, migrate data and reclaim CachyOS disk
      - nixos-anywhere supports installing to a specific disk without touching others
    alternatives_considered:
      - "Shrink existing CachyOS partition and dual-boot on same disk: risky with btrfs/CachyOS"
      - "VM-only, never migrate to bare metal: doesn't meet the goal"
      - "Overnight cutover: too risky for a daily driver"

  - topic: "Secrets management on bare metal"
    decision: |
      Continue with ragenix (already integrated in age.secrets.nix).
      Age key file on bare metal: /run/secrets/age-key.txt (provided via deploy.sh).
      For LUKS: use age key + initrd ssh unlock (dropbear) as fallback, TPM2 LUKS unlock if hardware supports.
    rationale: |
      - ragenix already works in VM config
      - Same age key as gopass setup (matches existing workflow)
      - For headless boots: initrd SSH unlock via dropbear so secrets are available without screen
      - LUKS passphrase also stored in gopass as recovery method
    alternatives_considered:
      - "sops-nix: rejected in VM phase; ragenix is simpler and matches age workflow"
      - "systemd-creds: interesting but less mature than ragenix"

  - topic: "Graphics testing methodology"
    decision: |
      Phase A: Test Hyprland + greetd in VM with virgl (already works — SPICE display).
      Phase B: On bare metal, test with:
      1. Boot nomodeset equivalent → verify kernel loads
      2. Switch to amdgpu → verify drm devices, modesetting
      3. Start Hyprland manually → verify compositor
      4. Enable greetd → verify DM
      All phases testable from the same flake with _gpu.mode toggle.
    rationale: |
      - VM testing catches 90% of compositor/greeter config issues
      - Bare-metal specific: GPU firmware, kernel params, PowerPlay, connector config
      - Incremental enablement: start headless (SSH), add GPU, add display, add compositor
      - deploy.sh should include a --test-gpu flag that does the incremental check
    alternatives_considered:
      - "Skip VM, test directly: too risky for daily driver"
      - "Full VM with GPU passthrough: complex and overkill for greeter testing"

  - topic: "Missing VM modules to complete before bare-metal"
    decision: |
      Before touching bare metal, these modules must be added to the VM config first:
      1. flatpak — service + flathub remote
      2. mpd + mpdas — Music Player Daemon with Last.fm scrobbling
      3. proxypilot — systemd service (binary exists in pkgs/, no service yet)
      4. espanso — working config file deployment
      5. user-services — systemd user service definitions matching user_services.sls
      6. installers — pip/cargo/go tools not in nixpkgs (those that are installable)
      7. image_gen — free-tier image provider secrets (from gopass)
    rationale: |
      - These are already working in Salt; porting them to NixOS is mechanical
      - Testing them in VM before bare-metal ensures they work
      - Hardware-specific things (zapret2, hiddify, fancontrol) can be bare-metal only
    alternatives_considered:
      - "Port everything directly to bare metal without VM: too risky"

known_unknowns:
  - topic: "AMDGPU VA-API (hardware video encode/decode) on bare metal"
    status: "NEEDS_TESTING"
    notes: |
      AMD RX 6000/7000 series VA-API support depends on mesa + kernel driver version.
      NixOS 25.05 mesa may need vaapiVdpau or specific amdgpu kernel params.
      Test with vainfo in VM first (virtio-gpu doesn't have VA-API — bare metal only test).

  - topic: "Secure Boot + signed NixOS boot"
    status: "NEEDS_DECISION"
    notes: |
      systemd-boot + sbctl works on Arch. NixOS equivalent: lanzaboote (Lanz) for signed
      systemd-boot + signed kernel/initrd. But requires TPM-based key storage.
      Deferred: ship without Secure Boot first, add later.

  - topic: "TPM2 LUKS auto-unlock"
    status: "DEFERRED"
    notes: |
      systemd-cryptenroll + TPM2 for automatic LUKS unlock at boot works on NixOS.
      Requires: TPM2 hardware, initrd integration, measured boot.
      Deferred to post-migration polish phase.

  - topic: "Windows 11 VM with GPU passthrough on bare metal"
    status: "DEFERRED"
    notes: |
      GPU passthrough to Windows VM is a complex feature (IOMMU groups, vfio-pci,
      ROM files, hugepages). Already working on CachyOS (desktop.vm_win11).
      Deferred: ship NixOS without win11 first, add GPU passthrough as a follow-up.
