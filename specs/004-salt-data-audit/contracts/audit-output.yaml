name: audit-output-contract
version: 1.0
description: "Contract specification for salt_audit.py output format"

format: YAML

schema:
  required_top_level_keys:
    - version
    - timestamp
    - hostname
    - salt_target
    - test_mode
    - duration_seconds
    - consumed
    - unused
    - total_data_files
    - consumed_count

  consumed_entry:
    required_keys:
      - data_file
      - consumers
      - access_method
    value_constraints:
      data_file: "Must match an existing states/data/*.yaml basename"
      consumers: "Non-empty list of valid Salt state targets"
      access_method: "One of: import_yaml, cp_get_file_str, j2_template"

  invariants:
    - "consumed_count == len(consumed)"
    - "len(consumed) + len(unused) == total_data_files (within tolerance for excluded files like feature_registry.yaml)"
    - "No data_file appears in both consumed and unused lists"
    - "Audit output files themselves (logs/audit-*.yaml) are never included in the report"

  contract_tests:
    - "test_audit_output_has_all_required_keys"
    - "test_audit_output_consumed_files_exist_in_data_dir"
    - "test_audit_output_no_duplicates"
    - "test_audit_output_counts_consistent"
