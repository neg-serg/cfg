name: data-model
version: 1.0
description: "Data model for Salt runtime audit log"

entities:
  - name: "AuditEntry"
    description: "A single data file consumption record within an audit run"
    fields:
      - name: "data_file"
        type: "string (path relative to states/data/)"
        description: "The data file that was consumed, e.g. 'ollama.yaml'"
        validation: "Must match an existing file in states/data/"
      - name: "consumers"
        type: "list of strings"
        description: "SLS state names that imported this data file, e.g. ['ollama', 'llama_embed']"
        validation: "Each consumer must be a valid state target"
      - name: "access_method"
        type: "enum: import_yaml | cp_get_file_str | j2_template"
        description: "How the data file was accessed"
      - name: "eval_count"
        type: "integer"
        description: "Number of times the data file was evaluated during the run (for dedup detection)"
        validation: ">= 1"

  - name: "AuditReport"
    description: "The complete audit output for one salt-apply run"
    fields:
      - name: "version"
        type: "integer"
        description: "Audit report format version (1)"
      - name: "timestamp"
        type: "ISO 8601 datetime"
        description: "When the audit was generated"
      - name: "hostname"
        type: "string"
        description: "Host where the audit ran, e.g. 'telfir'"
      - name: "salt_target"
        type: "string"
        description: "Salt state target that was applied, e.g. 'system_description'"
      - name: "test_mode"
        type: "boolean"
        description: "Whether the run was a dry-run (test=True)"
      - name: "duration_seconds"
        type: "float"
        description: "Total salt-apply duration"
      - name: "consumed"
        type: "list of AuditEntry"
        description: "Data files that were accessed during the run"
      - name: "unused"
        type: "list of strings"
        description: "Data files in states/data/ that were NOT accessed"
      - name: "total_data_files"
        type: "integer"
        description: "Total count of .yaml files in states/data/"
      - name: "consumed_count"
        type: "integer"
        description: "Count of consumed data files"

  - name: "AuditDiff"
    description: "Post-run comparison between audit log and full data inventory"
    fields:
      - name: "feature_gated"
        type: "list of strings"
        description: "Data files not consumed because their feature is disabled on this host"
      - name: "truly_orphaned"
        type: "list of strings"
        description: "Data files not consumed for unknown reasons (candidates for removal)"
      - name: "import_error"
        type: "list of strings"
        description: "Data files that were imported but failed to parse"
