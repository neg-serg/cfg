name: plan-template
version: 1.0
description: "Implementation plan for Salt runtime data audit log"

document:
  metadata:
    branch: "004-salt-data-audit"
    date: "2026-05-07"
    spec_ref: "specs/004-salt-data-audit/spec.yaml"
    input_description: "Runtime audit log — track which data YAML entries are consumed during salt-apply"

  sections:
    - name: Summary
      required: true
      description: |
        Add a runtime data consumption audit layer to salt-apply.sh that tracks 
        which `states/data/*.yaml` files are actually read (imported) during state 
        execution. Uses the existing data→state dependency graph from salt_impact.py 
        to build expected consumption sets, then validates against actual Salt execution 
        output to produce an audit report.

        Approach: wrapper script (`salt_audit.py`) that:
        1. Pre-computes the expected data file dependencies for the target state
        2. Runs salt-call with test=True (template evaluation without applying)
        3. Parses Salt's rendered output to detect which states were evaluated
        4. Maps evaluated states back to their data dependencies via the impact graph
        5. Produces an audit YAML report: consumed vs unused data files

        This avoids monkey-patching Salt internals. It leverages the existing 
        salt_impact.py infrastructure and follows the project's data-driven patterns.

    - name: Technical Context
      required: true
      fields:
        language_version: "Python 3.13+"
        primary_dependencies: "Salt 3006.x (salt-call), PyYAML, existing salt_impact.py/salt_source_model.py"
        storage: "YAML audit log files in logs/audit-<timestamp>.yaml"
        testing: "pytest"
        target_platform: "CachyOS (Arch-based Linux)"
        project_type: "cli (Salt wrapper script + audit report generator)"
        performance_goals: "<5% overhead in --audit mode, 0% overhead without --audit"
        constraints: |
          - Must not modify Salt internals (no monkey-patching)
          - Must work in test mode (--test) without applying states
          - Must integrate with salt-apply.sh workflow
          - Must reuse existing salt_impact.py data→state graph
        scale_scope: "Single host (telfir), 39 data files, 50 features, 19 services"

    - name: Constitution Check
      required: true
      gates:
        - name: "I. Idempotency"
          passed: true
          notes: "Audit runs in test mode by default — no state changes. Non-invasive wrapper."
        - name: "II. Network Resilience"
          passed: true
          notes: "Audit is purely local — no network access required."
        - name: "III. Secrets Isolation"
          passed: true
          notes: "Audit does not access or expose secrets. It only tracks file access metadata."
        - name: "IV. Macro-First"
          passed: true
          notes: "Uses existing salt_impact.py infrastructure. No macro changes needed."
        - name: "V. Minimal Change"
          passed: true
          notes: "Single new Python script (~150 lines), small addition to salt-apply.sh. No SLS changes."
        - name: "VI. Convention Adherence"
          passed: true
          notes: "Python script follows existing patterns (salt_audit.py). YAML output format."
        - name: "VII. Verification Gate"
          passed: true
          notes: "Audit itself is verifiable: run with --test to confirm it works before using in production."

    - name: Project Structure
      required: true
      docs_layout:
        path: "specs/004-salt-data-audit/"
        files:
          - name: "plan.yaml"
          - name: "research.yaml"
          - name: "data-model.yaml"
          - name: "quickstart.yaml"
          - name: "contracts/"
          - name: "tasks.yaml"
      source_layout:
        description: "Single new script + Justfile/apply script modifications"
        selected: "Single project (default)"
        structure: |
          scripts/salt_audit.py          # New: audit report generator
          scripts/salt_impact.py         # Existing: reuse data→state graph
          scripts/salt-apply.sh          # Modified: add --audit flag
          Justfile                       # Modified: add just audit command
          tests/test_salt_audit.py       # New: audit tests
          logs/audit-<timestamp>.yaml    # Output: audit reports
        decision_rationale: "Minimal footprint — reuses existing infrastructure. Single script + integration points. Follows existing project patterns (salt_impact.py, salt_contracts.py)."

    - name: Complexity Tracking
      required: false
