# Phase 1 Data Model: Jinja Macros → Python Modules

entities:

  - name: HostConfig
    description: "Resolved host configuration from hosts.yaml + feature_registry.yaml"
    fields:
      - name: user
        type: str
        description: "System username"
      - name: home
        type: str
        description: "User home directory path"
      - name: uid
        type: int
        description: "User UID"
      - name: features
        type: dict
        description: "Resolved feature flags (deep-merged defaults + overrides)"
      - name: runtime_dir
        type: str
        description: "XDG_RUNTIME_DIR for user services"
      - name: pkg_list
        type: str
        description: "Path to installed package list file"

  - name: ContainerSpec
    description: "Resolved container deployment specification"
    fields:
      - name: name
        type: str
        description: "Service name (catalog key)"
      - name: image
        type: str
        description: "Full image reference: registry/image@sha256:digest or localhost/image"
      - name: scope
        type: enum
        values: ["system", "user"]
        description: "Quadlet scope"
      - name: quadlet_source
        type: str
        description: "salt:// path to .container unit file"
      - name: quadlet_path
        type: str
        description: "Filesystem path for deployed .container file"
      - name: bind_mounts
        type: list[BindMount]
        description: "Tilde-expanded bind mounts"
      - name: manual_start
        type: bool
        description: "Skip enable/start if True"
      - name: localhost
        type: bool
        description: "True if image is built locally (skip pull)"
    relationships:
      - "references BindMount for each volume mapping"

  - name: BindMount
    description: "Container bind mount specification"
    fields:
      - name: host
        type: str
        description: "Absolute host path (tilde-expanded)"
      - name: container
        type: str
        description: "Container path"
      - name: mode
        type: str
        description: "Mount mode (ro, rw, z)"

  - name: ServiceSpec
    description: "Systemd service deployment specification"
    fields:
      - name: name
        type: str
        description: "Service name and state ID prefix"
      - name: unit_type
        type: enum
        values: ["service", "timer", "socket"]
      - name: source
        type: str
        description: "salt:// path to unit file"
      - name: enabled
        type: bool | None
        description: "True=enabled, False=disabled, None=skip"
      - name: running
        type: bool
        description: "Add reset_failed + service.running with watch"
      - name: template
        type: str | None
        description: "Jinja template renderer (e.g. 'jinja')"
      - name: context
        type: dict
        description: "Template variables"
      - name: requires
        type: list[str]
        description: "State requisites"
      - name: watch
        type: list[str]
        description: "State watch dependencies"

  - name: InstallSpec
    description: "Generic installer specification"
    fields:
      - name: name
        type: str
        description: "Package/artifact name"
      - name: method
        type: enum
        values: ["curl_bin", "cargo", "pipx", "paru", "http_file", "git_clone", "pkgbuild", "flatpak"]
      - name: creates
        type: str
        description: "Idempotency guard path"
      - name: parallel
        type: bool
        description: "Allow parallel execution"
      - name: retry
        type: RetrySpec
        description: "Network retry configuration"

  - name: RetrySpec
    description: "Network retry configuration"
    fields:
      - name: attempts
        type: int
        description: "Number of retry attempts"
      - name: interval
        type: int
        description: "Seconds between retries"

  - name: SecretSpec
    description: "Secret resolution specification"
    fields:
      - name: key
        type: str
        description: "gopass key path"
      - name: fallback_cmd
        type: str
        description: "Shell command to extract secret from existing config"
      - name: runas
        type: str | None
        description: "User to run gopass as"
    relationships:
      - "Uses gopass with GPG/age backend"
      - "Caches resolved values in namespace for cross-state sharing"
