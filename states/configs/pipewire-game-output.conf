context.objects = [
    # 16-bit stereo sink for FMOD/Unity games that can't handle pro-audio mode
    { factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "game_output"
            node.description = "Game Audio Output (Stereo)"
            media.class      = "Audio/Sink"
            audio.position   = [ FL FR ]
            audio.format     = "S16LE"
            audio.channels   = 2
            audio.rate       = 48000
            monitor.passthrough = true
            adapter.auto-port-config = {
                mode    = dsp
                monitor = true
            }
        }
    }
]
