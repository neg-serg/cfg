bins:
  amneziawg_go_bin:
    src: amneziawg-go-bin
    dest: amneziawg-go
  amneziawg_tools_bin:
    src: awg-bin
    dest: awg
  amnezia_vpn_bin:
    src: AmneziaVPN-bin
    dest: AmneziaVPN
  amnezia_service_bin:
    src: AmneziaVPN-service-bin
    dest: AmneziaVPN-service
verification:
  amneziawg_go: /usr/local/bin/amneziawg-go --version
  awg: /usr/local/bin/awg --version
  amnezia_vpn: ldd /usr/local/bin/AmneziaVPN
  amnezia_service: ldd /usr/local/bin/AmneziaVPN-service
systemd_unit: /usr/lib/systemd/system/AmneziaVPN-source.service
desktop_entry: amnezia-vpn.desktop
