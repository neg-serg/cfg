kernel_packages:
- linux-cachyos
- linux-cachyos-headers
- linux-cachyos-eevdf
- linux-cachyos-eevdf-headers
- linux-cachyos-hardened
- linux-cachyos-hardened-headers
- linux-cachyos-lts
- linux-cachyos-lts-headers
kernel_variants:
- linux-cachyos
- linux-cachyos-eevdf
- linux-cachyos-hardened
- linux-cachyos-lts
settings_package: cachyos-settings
scx_packages:
- scx-scheds
- scx-tools
services:
- ananicy-cpp
- cachyos-iw-set-regdomain.path
boot_entry: arch-linux-cachyos.efi
boot_splash:
  output: /usr/share/systemd/bootctl/splash-custom.bmp
kernel_cmdline_path: /etc/kernel/cmdline
