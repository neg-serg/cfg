pkgbuild:
  raise: {}
  richcolors: {}
  albumdetails: {}
  taoup:
    conflicts:
    - taoup-git
  proxypilot: {}
  ssh-to-age: {}
  sidecar: {}
  tailray: {}
  throne: {}
  duf:
    replace_check: pacman -Qi duf 2>/dev/null | grep -q neg-serg
  wl:
    timeout: 900
    replace_check: pacman -Qi wl 2>/dev/null | grep -q neg-serg
    conflicts:
    - swww-vulkan
    - swww
  neg-pretty-printer:
    extra_sources:
    - source: salt://build/pretty-printer
      dest: /tmp/pretty-printer
