hyprland_packages:
- hypridle
- hyprlock
- hyprpicker
- hyprpolkitagent
- wlr-randr
- xdg-desktop-portal-hyprland
screenshot_packages:
- grim
- slurp
- hyprquickframe-git
running_services:
- NetworkManager
- dbus-broker
- openrgb
- bluetooth
- sshd
- systemd-timesyncd
dconf_settings:
  /org/gnome/desktop/interface/gtk-theme: Flight-Dark-GTK
  /org/gnome/desktop/interface/icon-theme: kora
  /org/gnome/desktop/interface/font-name: Iosevka 10
hyprland_plugins:
- id: hyprland_plugins
  repo: https://github.com/hyprwm/hyprland-plugins
  dir: hyprland-plugins
  enable:
  - name: xtra-dispatchers
- id: hyprglass
  repo: https://github.com/hyprnux/hyprglass
  dir: HyprGlass
  enable:
  - name: hyprglass
- id: darkwindow
  repo: https://github.com/micha4w/Hypr-DarkWindow
  dir: Hypr-DarkWindow
  enable:
  - name: Hypr-DarkWindow
hyprland_check_plugins:
- borders-plus-plus
- hyprglass
- Hypr-DarkWindow
niri_packages:
- niri
- xwayland-satellite
- xdg-desktop-portal-gnome
- xdg-desktop-portal-gtk
portal_package: xdg-desktop-portal-termfilechooser-hunkyburrito-git
portal_service: xdg-desktop-portal.service
faillock_deny: '10'
desktop_packages:
  goose: goose-desktop-bin
  rsync: rsync
  localsend: localsend-bin
  chromium: chromium
  google_chrome: google-chrome
  zen_browser: zen-browser-bin
  wlr_which_key: wlr-which-key
  oomox: themix-full-git
system_packages:
  swtpm: swtpm
  pcsclite: pcsclite
  libvirt: libvirt
oomox_themes:
  Flight-Dark-GTK:
    hidpi: true
    palette:
      BG: "2e2e2e"
      FG: "dcdcdc"
      HDR_BG: "1e1e1e"
      HDR_FG: "dcdcdc"
      SEL_BG: "3584e4"
      SEL_FG: "ffffff"
      TXT_BG: "3c3c3c"
      TXT_FG: "dcdcdc"
      BTN_BG: "3c3c3c"
      BTN_FG: "dcdcdc"
      HDR_BTN_BG: "3c3c3c"
      HDR_BTN_FG: "dcdcdc"
      WM_BORDER_FOCUS: "3584e4"
      WM_BORDER_UNFOCUS: "2e2e2e"
