schema_version: 1
hyprland_packages:
- hypridle
- hyprlock
- hyprpicker
- hyprpolkitagent
- wlr-randr
- xdg-desktop-portal-hyprland
screenshot_packages:
- grim
- slurp
running_services:
- NetworkManager
- dbus-broker
- openrgb
- bluetooth
- sshd
- systemd-timesyncd
dconf_settings:
  /org/gnome/desktop/interface/gtk-theme: Flight-Dark-GTK
  /org/gnome/desktop/interface/icon-theme: kora
  /org/gnome/desktop/interface/font-name: Iosevka 10
hyprland_plugins:
- id: hyprland_plugins
  repo: https://github.com/hyprwm/hyprland-plugins
  dir: hyprland-plugins
  enable:
  - name: xtra-dispatchers
- id: hyprglass
  repo: https://github.com/hyprnux/hyprglass
  dir: HyprGlass
  enable:
  - name: hyprglass
- id: darkwindow
  repo: https://github.com/micha4w/Hypr-DarkWindow
  dir: Hypr-DarkWindow
  enable:
  - name: Hypr-DarkWindow
hyprland_check_plugins:
- xtra-dispatchers
- HyprGlass
- Hypr-DarkWindow
niri_packages:
- niri
- xwayland-satellite
- xdg-desktop-portal-gnome
- xdg-desktop-portal-gtk
portal_package: xdg-desktop-portal-termfilechooser-hunkyburrito-git
portal_service: xdg-desktop-portal.service
faillock_deny: '10'
desktop_packages:
  rsync: rsync
  localsend: localsend-bin
  chromium: chromium
  google_chrome: google-chrome
  zen_browser: zen-browser-bin
  wlr_which_key: wlr-which-key
system_packages:
  swtpm: swtpm
  pcsclite: pcsclite
  libvirt: libvirt
