files:
  - id: salt-monitor-script
    path: "{{ home }}/.local/bin/salt-monitor"
    severity: critical
    capture_after_apply: true
  - id: salt-alert-script
    path: "{{ home }}/.local/bin/salt-alert"
    severity: warning
    capture_after_apply: true
  - id: salt-monitor-unit
    path: "{{ home }}/.config/systemd/user/salt-monitor.service"
    severity: warning
    capture_after_apply: true
  - id: salt-monitor-watchdog-timer
    path: "{{ home }}/.config/systemd/user/salt-monitor-watchdog.timer"
    severity: info
    capture_after_apply: true

system_units:
  - name: sshd.service
    enabled: true
    severity: critical
  - name: NetworkManager.service
    enabled: true
    severity: critical
  - name: unbound.service
    enabled: true
    severity: critical
    optional: true

user_units:
  - name: salt-monitor.service
    enabled: true
    severity: critical
  - name: salt-monitor-watchdog.timer
    enabled: true
    severity: warning
  - name: salt-drift.timer
    enabled: true
    severity: warning
