# Synthetic hosts used for feature-matrix rendering/linting.
# Each entry overlay is merged with defaults from states/data/hosts.yaml.
# `name` must be a valid hostname value — referenced via grains['host'].

- name: matrix-monitoring
  description: Full monitoring stack (Loki/Promtail/Grafana)
  overrides:
    hostname: matrix-monitoring
    features:
      monitoring:
        loki: true
        promtail: true
        grafana: true
        alertmanager: true

- name: matrix-services
  description: Home-server services (DNS + Samba/Jellyfin/DuckDNS/Transmission/Bitcoin/Vaultwarden)
  overrides:
    hostname: matrix-services
    features:
      dns:
        unbound: true
        adguardhome: true
      services:
        samba: true
        jellyfin: true
        duckdns: true
        transmission: true
        bitcoind: true
      vaultwarden: true

- name: matrix-laptop-wifi
  description: Laptop profile with WiFi and no heavy services
  overrides:
    hostname: matrix-laptop-wifi
    is_laptop: true
    cpu_vendor: intel
    kvm_module: kvm_intel
    display: 2560x1600@165
    primary_output: eDP-1
    features:
      network:
        wifi: true
      steam: false
      ollama: false
      llama_embed: false

- name: matrix-no-floorp-profile
  description: Floorp enabled but no profile configured (empty string default)
  overrides:
    hostname: matrix-no-floorp-profile
    floorp_profile: ""
    features:
      floorp: true

- name: matrix-minimal
  description: All optional features disabled (minimal workstation)
  overrides:
    hostname: matrix-minimal
    features:
      monitoring:
        sysstat: false
        vnstat: false
        netdata: false
      amnezia: false
      steam: false
      mpd: false
      ollama: false
      llama_embed: false
      floorp: false
      kanata: false
      flatpak: false
      opencode: false
      image_gen: false
      proxypilot: false
      video_ai: false

- name: matrix-ipv6-tunnel
  description: IPv6 diagnostics + 6to4 + HE.net tunnel enabled
  overrides:
    hostname: matrix-ipv6-tunnel
    features:
      network:
        ipv6: true
        ipv6_6to4: true
        ipv6_tunnel: true

- name: matrix-containerized
  description: All containerized services enabled (exercises Quadlet/container_service render path)
  overrides:
    hostname: matrix-containerized
    features:
      monitoring:
        loki: true
        promtail: true
        grafana: true
        alertmanager: true
      dns:
        adguardhome: true
      services:
        jellyfin: true
        transmission: true
        bitcoind: true
        duckdns: true
      ollama: true
      llama_embed: true
      t5_summarization: true
      telethon_bridge: true
      proxypilot: true
      vaultwarden: true

- name: matrix-all-features
  description: All features enabled simultaneously (maximum coverage for lint/render matrix)
  overrides:
    hostname: matrix-all-features
    display: 3840x2160@240
    primary_output: DP-2
    floorp_profile: c85pjaxk.default-default
    zen_profile: qnkh60k3.Default (release)
    migrate_floorp_profile_to_zen: true
    features:
      monitoring:
        sysstat: true
        vnstat: true
        netdata: true
        loki: true
        promtail: true
        grafana: true
        alertmanager: true
        alerts: true
      dns:
        unbound: true
        adguardhome: true
        avahi: true
      services:
        samba: true
        jellyfin: true
        bitcoind: true
        duckdns: true
        transmission: true
      network:
        vm_bridge: true
        xray: true
        singbox: true
        tailscale: true
        zapret2: true
        hiddify: true
        wifi: true
        vpn_split_router: true
        vpn_hybrid: true
        ipv6: true
        ipv6_6to4: true
        ipv6_tunnel: true
      user_services:
        mail: true
        vdirsyncer: true
      fancontrol: true
      amnezia: true
      outline: true
      steam: true
      mpd: true
      ollama: true
      llama_embed: true
      t5_summarization: true
      floorp: true
      espanso: true
      kanata: true
      flatpak: true
      sudo_ssh_agent: true
      opencode: true
      telethon_bridge: true
      managed_bots: true
      video_ai: true
      image_gen: true
      proxypilot: true
      vaultwarden: true
      nyxt: true
      xen_vr: true
