schema_version: 1
diagnostics:
  timer:
    on_calendar: daily
    randomized_delay_sec: 600
  ping_hosts:
  - ipv6.google.com
  - he.net
  dns_aaaa_hosts:
  - ipv6.google.com
  - he.net
  - ip6.me
tunnel:
  interface_name: he-ipv6
  ttl: 64
  ip6tables_enable: true
  radvd:
    enable: false
    lan_interface: enp0s31f6
    adv_interval_min: 30
    adv_interval_max: 60
  sysctl:
    accept_ra: true
    autoconf: true
