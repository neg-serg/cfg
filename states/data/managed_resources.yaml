managed_service_identities:
  greetd:
    user: greetd
    group: greetd
    home: /var/lib/greetd
    shell: /usr/sbin/nologin
    gecos: Salt managed greetd service account
  loki:
    user: loki
    group: loki
    home: /var/lib/loki
    shell: /usr/sbin/nologin
    gecos: Salt managed Loki service account
managed_service_paths:
  loki_root:
    service: loki
    path: /var/lib/loki
    type: d
    mode: '0755'
    user: loki
    group: loki
    age: '-'
    argument: '-'
  loki_chunks:
    service: loki
    path: /var/lib/loki/chunks
    type: d
    mode: '0755'
    user: loki
    group: loki
    age: '-'
    argument: '-'
  loki_rules:
    service: loki
    path: /var/lib/loki/rules
    type: d
    mode: '0755'
    user: loki
    group: loki
    age: '-'
    argument: '-'
  loki_rules_temp:
    service: loki
    path: /var/lib/loki/rules-temp
    type: d
    mode: '0755'
    user: loki
    group: loki
    age: '-'
    argument: '-'
  greetd_root:
    service: greetd
    path: /var/lib/greetd
    type: d
    mode: '0755'
    user: greetd
    group: greetd
    age: '-'
    argument: '-'
  mpd_fifo:
    service: mpd
    path: /tmp/mpd.fifo
    type: p
    mode: '0660'
    user: __CURRENT_USER__
    group: __CURRENT_USER__
    age: '-'
    argument: '-'
