schema_version: 1
settings:
  desktop_notifications: false
system_services:
- name: sshd
  severity: critical
- name: unbound
  severity: critical
- name: cronie
  severity: warning
  optional: true
- name: NetworkManager
  severity: critical
- name: ollama
  severity: warning
  health_url: http://127.0.0.1:11434/api/tags
  optional: true
- name: llama-embed
  severity: warning
  health_url: http://127.0.0.1:11435/health
  optional: true
- name: t5-summarization
  severity: warning
  health_url: http://127.0.0.1:11436/health
  optional: true
- name: jellyfin-container
  severity: info
  optional: true
- name: transmission-container
  severity: info
  optional: true
- name: adguardhome-container
  severity: warning
  health_url: http://127.0.0.1:3000/
  optional: true
- name: loki-container
  severity: warning
  health_url: http://127.0.0.1:3100/ready
  optional: true
- name: promtail-container
  severity: info
  optional: true
- name: grafana-container
  severity: info
  health_url: http://127.0.0.1:3030/api/health
  optional: true
- name: netdata
  severity: info
  optional: true
- name: samba
  severity: info
  optional: true
- name: bitcoind-container
  severity: info
  optional: true
user_services:
- name: proxypilot-container
  severity: critical
- name: telethon-bridge
  severity: warning
  health_cmd: curl -sf http://127.0.0.1:8319/health
  health_parse: .connected
  auto_restart: true
  optional: true
- name: managed-bots
  severity: warning
  health_cmd: pgrep -f managed-bots-runner
  optional: true
  keepalive: true
- name: mpd
  severity: info
  optional: true
- name: imapnotify-gmail
  severity: info
  optional: true
- name: surfingkeys-server
  severity: info
  optional: true
- name: vicinae
  severity: info
  optional: true
user_timers:
- name: mbsync-gmail.timer
  severity: info
- name: vdirsyncer.timer
  severity: info
- name: salt-drift.timer
  severity: warning
resources:
  filesystems:
  - path: /
    warning_pct: 85
    critical_pct: 95
  - path: /home
    warning_pct: 85
    critical_pct: 95
  - path: /mnt/one
    warning_pct: 90
    critical_pct: 98
    optional: true
  memory:
    warning_available_pct: 10
  cpu:
    warning_load_pct: 90
    sustained_minutes: 5
