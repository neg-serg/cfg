# Ollama model definitions for ollama.sls
# Adding/removing a model is a YAML-only edit.
#
# ── Schema ────────────────────────────────────────────────────────────
#
# models:
#   - <model>:<tag>                — Ollama model specifier (e.g. "qwen3:8b-q8_0")
#                                    pulled via POST /api/pull; guarded by /api/tags check
#
# ── Quantization tiers ────────────────────────────────────────────────
#
#   Q8_0     — ≤14B dense models (fits 24GB VRAM, near-lossless)
#   Q6_K     — where available on Ollama (rare, e.g. qwen2.5-coder)
#   Q5_K_M   — 70B models (RAM+VRAM offload, best available mid-tier)
#   Q4_K_M   — 27-32B dense / MoE (default, Q8 too large for VRAM)
#
# ─────────────────────────────────────────────────────────────────────

models:
  # ── General-purpose ──────────────────────────────────────────────
  - qwen3.5:27b              # Alibaba; newest general, лучший <30B general-purpose ~17GB Q4
  # gemma4:27b              → does not exist in Ollama registry; re-enable when available
  # gemma4:9b               → does not exist in Ollama registry; re-enable when available
  # gemma3:27b              → удалён: не поддерживает tool calling (Ollama API 400)
  - qwen3:32b                # Alibaba; dense 32B, top quality general ~20GB Q4
  - llama3.3:70b-instruct-q5_K_M  # Meta; 128K ctx, лучше 3.1 на instruction following ~50GB Q5_K_M (RAM offload)
  - qwen3:235b-a22b          # Alibaba; MoE 235B (22B active), минимальная цензура ~142GB Q4 (GPU+RAM offload)
  # ── Code-specialized ─────────────────────────────────────────────
  - qwen2.5-coder:7b-instruct-q6_K  # Alibaba; lightweight FIM/completion, Q6_K ~6.3GB
  - qwen3-coder:30b          # Alibaba; MoE 3.3B active, 256K ctx, agentic coding ~18GB Q4
  - deepcoder:14b             # Agentica; reasoning-focused code, 128K ctx ~9GB Q4_K_M
  - devstral:24b              # Mistral; agentic coding, SWE-bench top tier ~19GB Q4
  # ── Reasoning ────────────────────────────────────────────────────
  - qwq:32b                   # Alibaba; dedicated reasoning/math, extended CoT ~20GB Q4
  # ── Vision-specialized ───────────────────────────────────────────
  - qwen2.5vl:7b-q8_0        # Alibaba; OCR+semantic, charts/docs/screenshots ~8GB Q8_0
  - glm-ocr                   # Zhipu AI; 0.9B OCR specialist, #1 OmniDocBench V1.5 ~1.8GB F16
  # ── Uncensored (abliterated) ─────────────────────────────────────
  - huihui_ai/qwen3-abliterated:30b-a3b      # huihui-ai; uncensored general MoE 3B active ~17GB Q4
  - huihui_ai/qwen3-coder-abliterated        # huihui-ai; uncensored coding MoE 3B active ~17GB Q4
  - huihui_ai/qwen3.5-abliterated:35b-a3b    # huihui-ai; uncensored newest MoE 3B active ~19GB Q4
  # ── Fast ─────────────────────────────────────────────────────────
  - qwen3:8b-q8_0             # Alibaba; fast general+thinking mode, hybrid CoT ~9GB Q8_0
  # ── Superseded ──────────────────────────────────────────────────────────────────
  # starcoder2:15b          → superseded by qwen3-coder:30b (outperforms on all benchmarks)
  # deepseek-coder-v2:16b   → superseded by qwen3-coder:30b (same niche, weaker)
  # codestral:22b           → replaced by devstral:24b (same Mistral, newer, agentic)
  # mistral-nemo            → replaced by qwen3:8b-q8_0 (better quality at same size)
  # qwen3:14b               → superseded by qwen3.5:27b (same family, newer, stronger)
  # gemma3:12b              → superseded by gemma3:27b → removed (no tool calling)
  # gemma3:27b              → removed: no tool calling support (Ollama API 400)
  # llama3.1:70b            → replaced by llama3.3:70b (same size, better quality)
  # deepseek-coder:6.7b     → superseded by deepseek-coder-v2:16b (same family, newer)
  # codellama:7b            → superseded by qwen2.5-coder:7b (loses on all benchmarks)
  # codegemma:7b            → superseded by gemma3:12b (same Google family, older)
