# Unified service catalog — single source of truth for ports, health
# endpoints, unit names, packages, and scope. Consumed via import_yaml by
# _macros_service.jinja (service_with_healthcheck, container_service) and
# individual .sls files.
#
# Fields (core):
#   port:         HTTP port (optional — omit for non-HTTP services)
#   health_path:  URL path for HTTP healthcheck (optional)
#   health_cmd:   Custom healthcheck command (optional — overrides port+health_path)
#   unit:         systemd unit name (required)
#   scope:        system | user (required)
#   packages:     pacman/AUR package name(s) (optional — omit if installed externally)
#   manual_start: true if service should NOT be enabled at boot (optional, default false)
#   timeout:      healthcheck timeout override in seconds (optional, default 30)
#   health_host:  bind address override (optional, default 127.0.0.1)
#
# Fields (containerization):
#   container_image:  string key into container_images.yaml (must match a
#                     top-level map key there).
#   gpu:              none (default) | amdgpu (/dev/kfd + /dev/dri/renderD128)
#                     | render_group (/dev/dri/renderD128 only, Vulkan-only).
#   bind_mounts:      list of {host: <path>, container: <path>, mode: ro|rw}.
#                     Tilde (~) in host paths is expanded to the invoking user's
#                     home by the container_service macro at render time.
#   env_file:         absolute host path for Quadlet `EnvironmentFile=`, or null.

loki:                          # Log aggregation (Grafana Loki)
  port: 3100
  health_path: /ready
  health_cmd: timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/3100' 2>/dev/null || ss -H -t -l -n | grep -q ':3100 '
  timeout: 30
  unit: loki
  scope: system
  containerized: true
  container_image: loki
  cutover_mode: in_place
  cutover_date: "2026-04-19"
  gpu: none
  bind_mounts:
    - host: /etc/loki
      container: /etc/loki
      mode: ro,Z               # Salt-managed config; container reads it read-only
    - host: /var/lib/loki-container
      container: /var/lib/loki
      mode: rw,Z               # Container state dir
  env_file: null

promtail:                      # Log shipper for Loki
  port: 9080
  health_path: /ready
  unit: promtail
  scope: system
  containerized: true
  container_image: promtail
  cutover_mode: in_place
  cutover_date: "2026-04-19"
  gpu: none
  bind_mounts:
    - host: /etc/promtail
      container: /etc/promtail
      mode: ro,Z
    - host: /var/log/journal
      container: /var/log/journal
      mode: ro,Z               # systemd journal (persistent)
    - host: /run/log/journal
      container: /run/log/journal
      mode: ro,Z               # systemd journal (runtime)
    - host: /var/cache/promtail
      container: /var/cache/promtail
      mode: rw,Z
  env_file: null

grafana:                       # Monitoring dashboard
  port: 3030
  health_path: /api/health
  timeout: 90
  unit: grafana
  scope: system
  packages: grafana
  containerized: true
  container_image: grafana
  cutover_mode: in_place
  cutover_date: "2026-04-19"
  gpu: none
  bind_mounts:
    - host: /etc/grafana.ini
      container: /etc/grafana/grafana.ini
      mode: ro,Z
    - host: /etc/grafana/provisioning
      container: /etc/grafana/provisioning
      mode: ro,Z               # provisioning-as-code already Salt-managed
    - host: /var/lib/grafana-container
      container: /var/lib/grafana
      mode: rw,Z
  env_file: null

adguardhome:                   # DNS-level ad blocker (containerized)
  port: 3000
  health_path: /
  unit: adguardhome
  scope: system
  packages: null               # installed via container_service image pull
  container_image: adguardhome
  gpu: none
  bind_mounts:
    - host: /var/lib/adguardhome-container
      container: /opt/adguardhome/work
      mode: rw                 # AdGuardHome work dir + config
  env_file: null

ollama:                        # Local LLM inference server
  port: 11434
  health_path: /api/tags
  unit: ollama
  scope: system
  manual_start: true
  packages: null               # installed via container_service image pull
  containerized: true
  container_image: ollama
  cutover_mode: in_place
  cutover_date: "2026-04-11"
  gpu: amdgpu                  # /dev/kfd (ROCm) + /dev/dri/renderD128
  bind_mounts:
    - host: /mnt/one/ollama/models
      container: /root/.ollama/models
      mode: rw
  env_file: null

llama_embed:                   # llama.cpp embedding server (Vulkan)
  port: 11435
  health_path: /health
  unit: llama_embed
  scope: system
  timeout: 90
  manual_start: true
  containerized: true
  container_image: llama_embed
  cutover_mode: in_place
  cutover_date: "2026-04-11"
  gpu: render_group            # Vulkan-only; no /dev/kfd needed
  bind_mounts:
    - host: /mnt/one/llama-embed/models
      container: /models
      mode: ro
  env_file: null

t5_summarization:              # llama.cpp T5 summarization server (Vulkan)
  port: 11436
  health_path: /health
  unit: t5_summarization
  scope: system
  timeout: 90
  manual_start: true
  containerized: true
  container_image: llama_embed   # reuses ggml-org/llama.cpp:server-vulkan
  cutover_mode: in_place
  cutover_date: "2026-04-11"
  gpu: render_group              # Vulkan-only; no /dev/kfd needed
  bind_mounts:
    - host: /mnt/one/t5-summarization/models
      container: /models
      mode: ro
  env_file: null

jellyfin:                      # Media server (containerized)
  port: 8096
  health_path: /health
  unit: jellyfin
  scope: system
  packages: null               # installed via container_service image pull
  container_image: jellyfin
  gpu: render_group            # VA-API hardware transcoding
  bind_mounts:
    - host: /etc/jellyfin
      container: /config
      mode: rw                 # Jellyfin config + library database
    - host: /var/cache/jellyfin
      container: /cache
      mode: rw                 # transcoding cache, thumbnails
  env_file: null

transmission:                  # BitTorrent client (containerized)
  port: 9091
  health_path: /transmission/web/
  unit: transmission
  scope: system
  packages: null               # installed via container_service image pull
  container_image: transmission
  gpu: none
  bind_mounts:
    - host: /etc/transmission
      container: /config
      mode: rw                 # transmission config (settings.json lives here)
    - host: ~/dw
      container: /watch
      mode: rw                 # torrent watch directory
    - host: ~/torrent/data
      container: /downloads
      mode: rw                 # download directory
  env_file: null

duckdns:                       # Dynamic DNS updater (containerized)
  unit: duckdns-update
  scope: system
  packages: null               # installed via container_service image pull
  container_image: duckdns
  gpu: none
  bind_mounts:
    - host: /etc/duckdns.env
      container: /etc/duckdns.env
      mode: ro                 # DUCKDNS_TOKEN and DUCKDNS_DOMAIN
  env_file: null

alertmanager:                  # Alert notification routing for Loki
  port: 9093
  health_path: /-/ready
  unit: alertmanager
  scope: system
  packages: null               # installed via container_service image pull
  container_image: alertmanager
  gpu: none
  bind_mounts:
    - host: /etc/alertmanager
      container: /etc/alertmanager
      mode: ro,Z               # config only; no persistent state
  env_file: null

unbound:                       # Recursive DNS resolver
  health_cmd: "unbound-control status >/dev/null 2>&1"
  unit: unbound
  scope: system
  packages: unbound

samba:                         # SMB file sharing
  unit: smb
  scope: system
  packages: samba
  manual_start: true

bitcoind:                      # Bitcoin Core node (containerized)
  unit: bitcoind
  scope: system
  packages: null               # installed via container_service image pull
  manual_start: true
  container_image: bitcoind
  gpu: none
  bind_mounts:
    - host: /var/lib/bitcoind-container
      container: /var/lib/bitcoind
      mode: rw                 # Bitcoin blockchain data
  env_file: null

# ─── Bridge tier (localhost images, built manually) ──────────────────
proxypilot:                    # LLM proxy (containerized)
  port: 8317
  health_cmd: "systemctl --user is-active --quiet proxypilot-container.service"
  unit: proxypilot
  scope: user
  packages: null               # installed via container_service image pull
  container_image: proxypilot
  gpu: none
  bind_mounts:
    - host: ~/.config/proxypilot
      container: /config
      mode: rw                 # ProxyPilot config.yaml
    - host: ~/.cli-proxy-api
      container: /root/.cli-proxy-api
      mode: rw                 # auth directory
  env_file: null

nanoclaw:                      # AI Telegram agent (containerized)
  port: 8318
  health_cmd: null
  unit: nanoclaw
  scope: user
  manual_start: true
  packages: null               # installed via container_service image pull
  container_image: nanoclaw
  gpu: none
  bind_mounts:
    - host: ~/.local/share/nanoclaw
      container: /app
      mode: rw                 # app data (store, data, groups, .env)
    - host: ~/.config/nanoclaw
      container: /config
      mode: rw                 # sender/mount allowlists
    - host: ~/.local/share/nanoclaw/entrypoint.sh
      container: /app/entrypoint.sh
      mode: ro                 # overridden entrypoint for daemon mode
    - host: ~/.local/share/nanoclaw/container-runtime-patched.ts
      container: /app/src/container-runtime.ts
      mode: ro                 # patched container runtime module
    - host: ~/.local/share/nanoclaw/index-main-patched.ts
      container: /app/src/index.ts
      mode: ro                 # patched main index.ts (skip channel check)
  env_file: ~/.local/share/nanoclaw/.env

telethon_bridge:               # Telegram bridge (python-telethon)
  unit: telethon-bridge
  scope: user
  packages: python-telethon
  health_cmd: "systemctl --user is-active --quiet telethon-bridge.service"
  container_image: telethon_bridge
  gpu: none
  bind_mounts:
    - host: ~/.telethon-bridge
      container: /data
      mode: rw
  env_file: null

opencode_serve:                # OpenCode HTTP API server
  port: 4096
  health_path: /
  unit: opencode-serve
  scope: user
  container_image: opencode_serve
  gpu: none
  bind_mounts:
    - host: ~/.config/opencode
      container: /config
      mode: rw
  env_file: null

# ─── Password management ────────────────────────────────────────────
vaultwarden:
  port: 8222
  health_path: /
  unit: vaultwarden
  scope: system
  packages: null
  container_image: vaultwarden
  gpu: none
  bind_mounts:
    - host: /var/lib/vaultwarden
      container: /data
      mode: rw
  env_file: null
