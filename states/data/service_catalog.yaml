schema_version: 1
loki:
  port: 3100
  health_path: /ready
  health_cmd: timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/3100' 2>/dev/null
    || ss -H -t -l -n | grep -q ':3100 '
  timeout: 30
  unit: loki
  scope: system
  containerized: true
  container_image: loki
  cutover_mode: in_place
  cutover_date: '2026-04-19'
  gpu: none
  bind_mounts:
  - host: /etc/loki
    container: /etc/loki
    mode: ro,Z
  - host: /var/lib/loki-container
    container: /var/lib/loki
    mode: rw,Z
  env_file: null
promtail:
  port: 9080
  health_path: /ready
  unit: promtail
  scope: system
  containerized: true
  container_image: promtail
  cutover_mode: in_place
  cutover_date: '2026-04-19'
  gpu: none
  bind_mounts:
  - host: /etc/promtail
    container: /etc/promtail
    mode: ro,Z
  - host: /var/log/journal
    container: /var/log/journal
    mode: ro,Z
  - host: /run/log/journal
    container: /run/log/journal
    mode: ro,Z
  - host: /var/cache/promtail
    container: /var/cache/promtail
    mode: rw,Z
  env_file: null
