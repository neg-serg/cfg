simple: {}
complex:
  samba:
    packages: samba
    dirs:
    - path: /mnt/zero/sync/smb
      mode: '0755'
      require:
      - mount: mount_zero
    config_templates:
    - dest: /etc/samba/smb.conf
      source: salt://configs/smb.conf.j2
      template: jinja
      makedirs: true
      context:
        hostname: hostname
        mnt_zero: mnt_zero
        user: user
    manual_start:
      service: smb
      stop: false
network:
  xray:
    packages: xray
    package_manager: paru
    dirs:
    - path: /etc/xray
      mode: '0750'
    unit:
      source: salt://units/xray.service
      enabled: false
      requires:
      - cmd: install_xray
    cleanup:
      paths:
      - /home/neg/.local/bin/xray
      onlyif: test -f /home/neg/.local/bin/xray
  singbox:
    unit:
      source: salt://units/sing-box-tun.service
      template: jinja
      enabled: null
      unit_context:
        home: home
        uid: uid
        vpn_split_router: vpn_split_router
  tailscale:
    packages: tailscale
    service: tailscaled
    config_templates:
    - dest: /etc/unbound/unbound.conf.d/tailscale.conf
      source: salt://configs/tailscale-dns-stub.conf.j2
      makedirs: true
      require:
      - cmd: install_unbound
      onchanges_restart: unbound
dns:
  unbound:
    packages: unbound
    config_templates:
    - dest: /etc/unbound/unbound.conf
      source: salt://configs/unbound.conf
      makedirs: true
      mode: '0644'
    dirs:
    - path: /etc/unbound/unbound.conf.d
      mode: '0755'
    setup_commands:
    - name: unbound-anchor -a /var/lib/unbound/root.key || true
      creates: /var/lib/unbound/root.key
    - name: unbound-control-setup
      creates: /etc/unbound/unbound_server.pem
    - name: chown -R unbound:unbound /etc/unbound/unbound_*.pem /etc/unbound/unbound_*.key
      onlyif: 'stat -c ''%U'' /etc/unbound/unbound_server.pem 2>/dev/null | grep -qv
        ''unbound''

        '
    unit_override:
      name: unbound_restart_override
      service: unbound.service
      source: salt://units/unbound-restart-override.conf
    ensure_running:
      service: unbound
      watch:
      - file: unbound_config_0
      - file: unbound_restart_override
    healthcheck:
      command: unbound-control status >/dev/null 2>&1
      requires:
      - service: unbound_running
  avahi:
    packages: avahi nss-mdns
    service: avahi-daemon
    config_templates:
    - dest: /etc/avahi/avahi-daemon.conf
      source: salt://configs/avahi-daemon.conf
      makedirs: true
      mode: '0644'
    ensure_running:
      service: avahi-daemon
      watch:
      - file: avahi_config_0
