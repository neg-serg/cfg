schema_version: 1
subdirs:
  comfyui: comfyui
  models: models
  workflows: workflows
  output: output
  images: images
runners:
  generate: generate.sh
  generate_image: generate-image.sh
  gen_video: gen-video
comfyui_nodes:
- repo: https://github.com/Lightricks/ComfyUI-LTXVideo
  dir: ComfyUI-LTXVideo
- repo: https://github.com/kijai/ComfyUI-WanVideoWrapper
  dir: ComfyUI-WanVideoWrapper
- repo: https://github.com/city96/ComfyUI-GGUF
  dir: ComfyUI-GGUF
models:
- id: ltx-23-distilled-fp8
  name: LTX-2.3 22B Distilled FP8
  enabled: true
  repo: Kijai/LTX2.3_comfy
  files:
  - diffusion_models/ltx-2.3-22b-distilled-1.1_transformer_only_bf16.safetensors
  loader: diffusion_model
  text_encoder: dual
  vae: taeltx2-3
  precision: fp8
  vram_gb: 22
  modes:
  - t2v
  - i2v
  max_resolution: 4k
  steps: 8
  default: true
  comfyui_workflow: ltx23-distilled-t2v.json
  comfyui_workflow_i2v: ltx23-distilled-i2v.json
  notes: 22B distilled, 4-8 step inference, uncensored, needs --lowvram on 24GB
- id: wan21-t2v-14b
  name: Wan2.1 T2V 14B GGUF Q5
  enabled: true
  repo: city96/Wan2.1-T2V-14B-gguf
  files:
  - wan2.1-t2v-14b-Q5_K_M.gguf
  precision: gguf-q5
  vram_gb: 11
  modes:
  - t2v
  max_resolution: 480p
  default: false
  comfyui_workflow: wan21-t2v.json
  notes: very good quality, censored (Chinese training data), ~20 min per 4s clip
image_models:
- id: chroma-hd
  name: Chroma1-HD
  enabled: true
  repo: lodestones/Chroma1-HD
  file: Chroma1-HD.safetensors
  loader: diffusion_model
  text_encoder: t5xxl_fp8
  vae: flux-ae
  vram_gb: 20
  resolution: 1152x1152
  steps: 26
  cfg: 3.8
  sampler: euler
  scheduler: beta
  comfyui_workflow: chroma-t2i.json
  comfyui_workflow_i2i: chroma-i2i.json
  notes: BF16 only (FP8/GGUF broken on RDNA3), fits 24GB with T5 offloading
text_encoders:
- id: t5xxl_fp8
  file: t5xxl_fp8_e4m3fn.safetensors
  repo: comfyanonymous/flux_text_encoders
  dir: text_encoders
- id: gemma_fp4
  file: gemma_3_12B_it_fp4_mixed.safetensors
  repo: Comfy-Org/gemma_3_repackaged
  dir: text_encoders
- id: ltx23_text_projection
  file: ltx-2.3_text_projection_bf16.safetensors
  repo: Kijai/LTX2.3_comfy
  dir: text_encoders
- id: gemma_tokenizer
  file: tokenizer.model
  repo: unsloth/gemma-3-12b-it
  dir: text_encoders
vaes:
- id: flux-ae
  file: ae.safetensors
  repo: cocktailpeanut/xulf-dev
  dir: vae
- id: taeltx2-3
  file: LTX23_video_vae_bf16.safetensors
  repo: Kijai/LTX2.3_comfy
  dir: vae
